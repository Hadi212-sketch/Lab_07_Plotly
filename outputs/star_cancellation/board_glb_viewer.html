<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Star Cancellation Board Viewer</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Tahoma, Arial, sans-serif;
            background: #f5f5f5;
        }

        .wrap {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 16px;
        }

        model-viewer {
            width: 100%;
            height: 72vh;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h2>Star Cancellation Board (.glb)</h2>
        <model-viewer src="../../Board.glb/Board.glb" camera-controls auto-rotate shadow-intensity="1"></model-viewer>
        <p>Model: Board.glb/Board.glb | Data: 341980.json</p>
    </div>
</body>

</html>
